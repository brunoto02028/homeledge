server {
    server_name clarityco.co.uk www.clarityco.co.uk;

    location /uploads/ {
        alias /opt/homeledger/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /sw.js {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        client_max_body_size 50M;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/clarityco.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clarityco.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.clarityco.co.uk) { return 301 https://$host$request_uri; }
    if ($host = clarityco.co.uk) { return 301 https://$host$request_uri; }
    listen 80;
    server_name clarityco.co.uk www.clarityco.co.uk;
    return 404;
}
