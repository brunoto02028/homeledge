server {
    listen 443 ssl;
    server_name homeledger.co.uk www.homeledger.co.uk;

    ssl_certificate /etc/letsencrypt/live/homeledger.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/homeledger.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # TrueLayer OAuth callback - proxy directly to app (don't redirect)
    location /api/open-banking/callback {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host homeledger.co.uk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Everything else redirects to new domain
    location / {
        return 301 https://clarityco.co.uk$request_uri;
    }
}

server {
    listen 80;
    server_name homeledger.co.uk www.homeledger.co.uk;
    return 301 https://clarityco.co.uk$request_uri;
}
