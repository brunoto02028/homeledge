<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="35%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer C: center (195, 256), r=150, opening ±40° -->
  <path d="M 310 160 A 150 150 0 1 0 310 352"
        stroke="url(#gold)" stroke-width="42" stroke-linecap="butt" fill="none"/>

  <!-- Inner C with horizontal crossbar stems: center (300, 256), r=90 -->
  <path d="M 390 189 L 360 189 A 90 90 0 1 0 360 323 L 390 323"
        stroke="url(#gold)" stroke-width="42" stroke-linecap="butt" fill="none"/>
</svg>
